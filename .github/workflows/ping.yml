name: Keep Supabase Active

on:
  schedule:
    - cron: "*/30 * * * *"

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Check secrets
        run: |
          echo "URL length: ${#SUPABASE_URL}"
          echo "KEY length: ${#SERVICE_ROLE}"
          
      - name: Insert Ping
        run: |
          curl -X POST \
            "$SUPABASE_URL/rest/v1/ping" \
            -H "apikey: $SERVICE_ROLE" \
            -H "Authorization: Bearer $SERVICE_ROLE" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{}'

      - name: Delete old rows
        run: |
          CUTOFF=$(date -u -d "1 day ago" +"%Y-%m-%dT%H:%M:%SZ")

          curl -X DELETE \
            "$SUPABASE_URL/rest/v1/ping?created_at=lt.$CUTOFF" \
            -H "apikey: $SERVICE_ROLE" \
            -H "Authorization: Bearer $SERVICE_ROLE"
